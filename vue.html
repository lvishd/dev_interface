                    <label>

                    </label>
                    <label>
                        <input type="radio" name="type" value="final" />

                    </label>
                </div>

                <div class="buttons">
                    <button id="createBtn">Créer</button>
                    <button id="cancelBtn">Annuler</button>
                </div>
            </div>
        </div>
