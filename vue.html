<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Mermaid + ELK</title>

        <!-- Styles -->
        <link rel="stylesheet" href="style.css" />

        <!-- External libs -->
        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    </head>

    <body>
        <div class="container">
            <div>
                <button id="reset-graph">Reset</button>
                <button id="add-node-btn">Ajouter un élément</button>
            </div>

            <div id="preview" class="mermaid"></div>
        </div>

        <div id="error"></div>

        <div id="modal-add-node" class="modal hidden">
            <div class="modal-content">
                <h3>Créer un élément</h3>

                <input type="text" id="nodeId" placeholder="id" />

                <div>
                    Type :
                    <label>
                        <input type="radio" name="type" value="etape" checked />
                        etape
                    </label>
                    <label>
                        <input type="radio" name="type" value="final" />
                        final
                    </label>
                </div>

                <div class="buttons">
                    <button id="createBtn">Créer</button>
                    <button id="cancelBtn">Annuler</button>
                </div>
            </div>
        </div>

        <div id="modal-manage-node" class="modal hidden">
            <div class="modal-content">
                <h3>
                    Etape
                    <span id="node-id"></span>
                    <span id="node-type-final"> (étape finale)</span>
                </h3>

                <div id="main-container">
                    <div id="box-questions">
                        <div class="title-header">
                            <span>Questions</span>
                            <button id="add-question-btn">+</button>
                        </div>
                        <div id="container-questions"></div>
                    </div>
                    <div id="box-conditions">
                        <div class="title-header">
                            <span>Conditions</span>
                            <button id="add-condition-btn">+</button>
                        </div>
                        <div id="container-conditions"></div>
                    </div>
                </div>

                <div class="buttons">
                    <button id="deleteBtn">Supprimer</button>
                    <button id="saveBtn">Enregistrer</button>
                    <button id="cancelBtn">Annuler</button>
                </div>
            </div>
        </div>

        <div id="modal-add-question" class="modal hidden">
            <div class="modal-content">
                <h3>Questions</h3>

                <div id="questions-disponibles">
                    <button>Q1: Boursier ?</button>
                    <button>Q2: Double Nationalité</button>
                </div>

                <div class="buttons">
                    <button id="cancelBtn">Annuler</button>
                </div>
            </div>
        </div>

        <div id="modal-modify-condition" class="modal hidden">
            <div class="modal-content">
                <h3>Condition</h3>

                <input type="text" placeholder="Condition" />

                <div class="buttons">
                    <button id="saveBtn">Enregistrer</button>
                    <button id="cancelBtn">Annuler</button>
                </div>
            </div>
        </div>
        <!-- Script -->
        <script src="globalVariables.js"></script>
        <script type="module" src="functions.js"></script>
    </body>
</html>
