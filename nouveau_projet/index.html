<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Studio — Tunnels & Tarification</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

        <!-- Styles -->
        <link rel="stylesheet" href="style.css" />

        <!-- External libs -->
        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    </head>

    <body>
        <div class="app">
            <!-- ── Sidebar ── -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div>
                        <h1 class="sidebar-title">Tunnels & Tarification</h1>
                        <p class="sidebar-subtitle"></p>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <div class="nav-section">ORCHESTRATION</div>
                    <a href="#tunnels" class="nav-item active" data-page="tunnels">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span>Tunnels</span>
                    </a>

                    <div class="nav-section">TARIFICATION</div>
                    <a href="#formulas" class="nav-item" data-page="formulas">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span>Formules tarifaires</span>
                    </a>
                    <a href="#schemas" class="nav-item" data-page="schemas">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span>Schémas de calcul</span>
                    </a>

                    <div class="nav-section">RÉFÉRENTIELS</div>
                    <a href="#variables" class="nav-item" data-page="variables">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        <span>Variables</span>
                    </a>
                </nav>
            </aside>

            <!-- ── Main content ── -->
            <main class="main" id="page-content">
                <!-- Dynamically rendered by page modules -->
            </main>
        </div>

        <!-- ── Modal layer 1 (primary) ── -->
        <div class="modal hidden" id="app-modal">
            <div class="modal-content" id="app-modal-content"></div>
        </div>

        <!-- ── Modal layer 2 (nested: conditions, questions) ── -->
        <div class="modal hidden" id="app-modal-2">
            <div class="modal-content" id="app-modal-2-content"></div>
        </div>

        <!-- Scripts: core -->
        <script src="js/core/store.js"></script>
        <script src="js/models.js"></script>
        <script src="js/mock-data.js"></script>
        <script src="js/ui-helpers.js"></script>

        <!-- Scripts: pages -->
        <script src="js/pages/tunnel-list.js"></script>
        <script src="js/pages/tunnel-editor.js"></script>
        <script src="js/pages/step-editor.js"></script>
        <script src="js/pages/schema-list.js"></script>
        <script src="js/pages/schema-editor.js"></script>
        <script src="js/pages/formulas.js"></script>
        <script src="js/pages/variables.js"></script>

        <!-- Module entry point (imports mermaid) -->
        <script type="module" src="js/main.js"></script>
    </body>
</html>
